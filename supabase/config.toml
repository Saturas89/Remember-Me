# Supabase local development configuration.
# Used by `supabase start` to spin up a local Postgres + Auth + REST stack.
# In CI this is started by the interaction-real-db job in interaction-tests.yml.

project_id = "storyhold"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

# Realtime is not used by Storyhold (polling-based sync only).
[realtime]
enabled = false

# Studio and Inbucket are not needed in CI or automated tests.
[studio]
enabled = false
port = 54323

[inbucket]
enabled = false
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:4173"
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = false
double_confirm_changes = false
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"

[auth.sms]
enable_signup = false
enable_confirmations = false

[analytics]
enabled = false
