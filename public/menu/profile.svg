<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Pedestal base -->
  <rect x="28" y="88" width="44" height="6" rx="1" fill="#3a3a4a"/>
  <rect x="32" y="82" width="36" height="8" rx="1" fill="#4a4a5a"/>
  <!-- Pedestal marble texture -->
  <line x1="35" y1="86" x2="65" y2="86" stroke="#555568" stroke-width="0.5" opacity="0.5"/>
  <!-- Pedestal top -->
  <rect x="34" y="78" width="32" height="5" rx="1" fill="#555568"/>
  <!-- Neck -->
  <rect x="43" y="68" width="14" height="12" rx="2" fill="#c9a84c"/>
  <!-- Bust shoulders -->
  <path d="M30 82 Q30 70 43 68 L57 68 Q70 70 70 82Z" fill="#c9a84c"/>
  <!-- Shoulder details -->
  <path d="M30 82 Q32 74 40 70" stroke="#a88030" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M70 82 Q68 74 60 70" stroke="#a88030" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Clothing drape -->
  <path d="M36 78 Q42 72 50 74 Q58 72 64 78" stroke="#a88030" stroke-width="1.5" fill="none"/>
  <!-- Head -->
  <ellipse cx="50" cy="48" rx="16" ry="20" fill="#c9a84c"/>
  <!-- Face shadow/features -->
  <ellipse cx="50" cy="50" rx="13" ry="16" fill="#d4ac5a" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="44" cy="48" rx="2" ry="1.5" fill="#a88030"/>
  <ellipse cx="56" cy="48" rx="2" ry="1.5" fill="#a88030"/>
  <!-- Nose -->
  <path d="M50 46 L48 54 L52 54" stroke="#a88030" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M45 58 Q50 61 55 58" stroke="#a88030" stroke-width="1" fill="none"/>
  <!-- Hair/curls -->
  <path d="M34 44 Q32 34 38 28 Q44 22 50 22 Q56 22 62 28 Q68 34 66 44" fill="#b8942c" stroke="#a08020" stroke-width="1"/>
  <!-- Hair curls detail -->
  <path d="M36 40 Q34 36 36 32 Q38 28 42 26" stroke="#a08020" stroke-width="1.5" fill="none"/>
  <path d="M64 40 Q66 36 64 32 Q62 28 58 26" stroke="#a08020" stroke-width="1.5" fill="none"/>
  <path d="M40 24 Q45 20 50 22" stroke="#a08020" stroke-width="1" fill="none"/>
  <path d="M60 24 Q55 20 50 22" stroke="#a08020" stroke-width="1" fill="none"/>
  <!-- Hair top curls -->
  <circle cx="42" cy="24" r="3" fill="#b8942c" stroke="#a08020" stroke-width="0.5"/>
  <circle cx="50" cy="22" r="3" fill="#b8942c" stroke="#a08020" stroke-width="0.5"/>
  <circle cx="58" cy="24" r="3" fill="#b8942c" stroke="#a08020" stroke-width="0.5"/>
</svg>
