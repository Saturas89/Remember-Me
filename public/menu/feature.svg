<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Chest body -->
  <rect x="14" y="48" width="72" height="38" rx="4" fill="#8b6914" stroke="#6b4f10" stroke-width="2"/>
  <!-- Chest wood grain -->
  <line x1="14" y1="60" x2="86" y2="60" stroke="#7a5c12" stroke-width="1" opacity="0.5"/>
  <line x1="14" y1="72" x2="86" y2="72" stroke="#7a5c12" stroke-width="1" opacity="0.5"/>
  <!-- Chest front detail -->
  <rect x="40" y="62" width="20" height="14" rx="2" fill="#6b4f10" opacity="0.4"/>
  <!-- Keyhole -->
  <circle cx="50" cy="67" r="3" fill="#c9a84c"/>
  <rect x="48.5" y="69" width="3" height="5" rx="1" fill="#c9a84c"/>
  <!-- Chest lid (open, tilted back) -->
  <path d="M14 48 L14 32 Q14 28 18 28 L82 28 Q86 28 86 32 L86 48" fill="#a07818" stroke="#6b4f10" stroke-width="2"/>
  <path d="M14 48 L8 38 Q6 34 10 30 L18 20 Q22 16 28 18 L72 18 Q78 16 82 20 L90 30 Q94 34 92 38 L86 48" fill="#a07818" stroke="#6b4f10" stroke-width="2"/>
  <!-- Lid wood grain -->
  <path d="M18 38 L82 38" stroke="#8b6914" stroke-width="1" opacity="0.5"/>
  <!-- Metal band on lid -->
  <rect x="12" y="44" width="76" height="4" rx="1" fill="#c9a84c" opacity="0.6"/>
  <!-- Gear 1 (left) -->
  <g transform="translate(30, 16)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#7a8a9a" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="3" fill="#7a8a9a"/>
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#7a8a9a" stroke-width="2.5"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#7a8a9a" stroke-width="2.5"/>
    <line x1="-6.4" y1="-6.4" x2="6.4" y2="6.4" stroke="#7a8a9a" stroke-width="2.5"/>
    <line x1="6.4" y1="-6.4" x2="-6.4" y2="6.4" stroke="#7a8a9a" stroke-width="2.5"/>
  </g>
  <!-- Gear 2 (right, smaller) -->
  <g transform="translate(68, 12)">
    <circle cx="0" cy="0" r="5.5" fill="none" stroke="#8a9aaa" stroke-width="2"/>
    <circle cx="0" cy="0" r="2.5" fill="#8a9aaa"/>
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#8a9aaa" stroke-width="2"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#8a9aaa" stroke-width="2"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#8a9aaa" stroke-width="2"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#8a9aaa" stroke-width="2"/>
  </g>
  <!-- Sparkle 1 -->
  <path d="M50 4 L51.5 0 L53 4 L57 5.5 L53 7 L51.5 11 L50 7 L46 5.5Z" fill="#c9a84c"/>
  <!-- Sparkle 2 -->
  <path d="M80 22 L81 19 L82 22 L85 23 L82 24 L81 27 L80 24 L77 23Z" fill="#c9a84c" opacity="0.8"/>
  <!-- Sparkle 3 -->
  <path d="M18 8 L19 5.5 L20 8 L22.5 9 L20 10 L19 12.5 L18 10 L15.5 9Z" fill="#c9a84c" opacity="0.6"/>
</svg>
