<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2647"/>
      <stop offset="100%" stop-color="#0f1523"/>
    </linearGradient>
    <linearGradient id="heart" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ff6080"/>
      <stop offset="100%" stop-color="#c73356"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>

  <!-- Heart: scale 0.88, centered in 48×48 -->
  <!-- tx=2.88, ty=3.32 → padding ~4.6px left/right, ~8.7px top, ~8.6px bottom -->
  <g transform="translate(2.88, 3.32) scale(0.88)">
    <!-- Soft shadow -->
    <path
      d="M24 41C24 41 2 27 2 13.5A11.5 11.5 0 0 1 24 6.1 11.5 11.5 0 0 1 46 13.5C46 27 24 41 24 41Z"
      fill="#8b0025"
      opacity="0.45"
      transform="translate(0, 2.5)"
    />
    <!-- Heart -->
    <path
      d="M24 41C24 41 2 27 2 13.5A11.5 11.5 0 0 1 24 6.1 11.5 11.5 0 0 1 46 13.5C46 27 24 41 24 41Z"
      fill="url(#heart)"
    />
    <!-- Shine highlight -->
    <path
      d="M13 10c-3 0-5.5 2.5-5.5 5.5"
      stroke="rgba(255,255,255,0.42)"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
    />
  </g>
</svg>
