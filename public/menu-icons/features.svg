<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="ftWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8C5E2A"/>
      <stop offset="100%" stop-color="#5A3815"/>
    </linearGradient>
    <linearGradient id="ftLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A77540"/>
      <stop offset="100%" stop-color="#6E4520"/>
    </linearGradient>
    <linearGradient id="ftGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7DE9B"/>
      <stop offset="100%" stop-color="#C08A2E"/>
    </linearGradient>
    <linearGradient id="ftGear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B8BB5"/>
      <stop offset="100%" stop-color="#3D5D88"/>
    </linearGradient>
  </defs>
  <!-- chest body -->
  <rect x="12" y="32" width="40" height="22" rx="2" fill="url(#ftWood)"/>
  <rect x="12" y="32" width="40" height="4" fill="#3E2710"/>
  <!-- gold inside -->
  <path d="M14 36 C20 40 30 41 50 38 V36 Z" fill="url(#ftGold)"/>
  <circle cx="20" cy="39" r="1.4" fill="#F7DE9B"/>
  <circle cx="26" cy="40" r="1.2" fill="#F7DE9B"/>
  <circle cx="34" cy="39" r="1.3" fill="#F7DE9B"/>
  <!-- lid, open -->
  <path d="M10 32 Q32 12 54 32 Z" fill="url(#ftLid)"/>
  <path d="M12 32 Q32 16 52 32" fill="none" stroke="#3E2710" stroke-width="1"/>
  <!-- sparkles -->
  <path d="M30 22 l1 2 l2 1 l-2 1 l-1 2 l-1 -2 l-2 -1 l2 -1 Z" fill="#FDF0C4"/>
  <path d="M40 26 l0.8 1.6 l1.6 0.8 l-1.6 0.8 l-0.8 1.6 l-0.8 -1.6 l-1.6 -0.8 l1.6 -0.8 Z" fill="#FDF0C4"/>
  <!-- lock -->
  <rect x="30" y="38" width="4" height="5" rx="0.5" fill="#E6C179" stroke="#6E4520" stroke-width="0.6"/>
  <!-- gears -->
  <g transform="translate(10 18)">
    <path d="M6 0 L8 0 L8.5 2 L10 2.7 L11.7 1.8 L13 3.2 L12 4.7 L12.5 6.3 L14.5 7 L14.5 9 L12.5 9.7 L12 11.3 L13 12.8 L11.7 14.2 L10 13.3 L8.5 14 L8 16 L6 16 L5.5 14 L4 13.3 L2.3 14.2 L1 12.8 L2 11.3 L1.5 9.7 L-0.5 9 L-0.5 7 L1.5 6.3 L2 4.7 L1 3.2 L2.3 1.8 L4 2.7 L5.5 2 Z" fill="url(#ftGear)"/>
    <circle cx="7" cy="8" r="2.4" fill="#F4F6FA"/>
  </g>
  <g transform="translate(44 12)">
    <path d="M5 0 L6.5 0 L7 1.6 L8.2 2.2 L9.6 1.5 L10.7 2.6 L9.9 3.9 L10.3 5.2 L12 5.8 L12 7.3 L10.3 7.9 L9.9 9.2 L10.7 10.5 L9.6 11.6 L8.2 10.9 L7 11.5 L6.5 13.1 L5 13.1 L4.5 11.5 L3.3 10.9 L1.9 11.6 L0.8 10.5 L1.6 9.2 L1.2 7.9 L-0.5 7.3 L-0.5 5.8 L1.2 5.2 L1.6 3.9 L0.8 2.6 L1.9 1.5 L3.3 2.2 L4.5 1.6 Z" fill="url(#ftGear)"/>
    <circle cx="5.75" cy="6.55" r="1.9" fill="#F4F6FA"/>
  </g>
</svg>
