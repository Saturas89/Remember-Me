<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="38" y="72" width="124" height="86" rx="14" fill="white" opacity="0.92"/>
  <!-- Camera top ridge (shutter section) -->
  <rect x="62" y="60" width="76" height="20" rx="6" fill="white" opacity="0.85"/>
  <!-- Shutter button -->
  <circle cx="150" cy="70" r="7" fill="#E5E7EB"/>
  <circle cx="150" cy="70" r="4" fill="#9CA3AF"/>
  <!-- Camera lens outer -->
  <circle cx="100" cy="113" r="32" fill="#1F2937"/>
  <!-- Lens ring -->
  <circle cx="100" cy="113" r="28" fill="#111827"/>
  <circle cx="100" cy="113" r="22" fill="#1E3A5F"/>
  <!-- Lens inner reflections -->
  <circle cx="100" cy="113" r="18" fill="#1D4ED8" opacity="0.6"/>
  <ellipse cx="92" cy="105" rx="7" ry="5" fill="white" opacity="0.2"/>
  <circle cx="108" cy="121" r="3" fill="white" opacity="0.15"/>
  <!-- Viewfinder -->
  <rect x="48" y="78" width="22" height="16" rx="4" fill="#E5E7EB"/>
  <!-- Flash -->
  <rect x="76" y="78" width="14" height="10" rx="3" fill="#FDE68A"/>
  <!-- Strap lugs -->
  <rect x="36" y="88" width="8" height="16" rx="4" fill="#D1D5DB"/>
  <rect x="156" y="88" width="8" height="16" rx="4" fill="#D1D5DB"/>
  <!-- Label / brand strip -->
  <rect x="50" y="146" width="100" height="8" rx="4" fill="#F3F4F6" opacity="0.5"/>
</svg>
