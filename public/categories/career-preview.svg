<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Compass outer ring -->
  <circle cx="100" cy="100" r="52" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
  <circle cx="100" cy="100" r="46" fill="rgba(255,255,255,0.12)"/>
  <!-- Compass rose N/S/E/W pointers -->
  <!-- North (red) -->
  <polygon points="100,52 94,100 106,100" fill="#EF4444"/>
  <!-- South (white) -->
  <polygon points="100,148 94,100 106,100" fill="rgba(255,255,255,0.85)"/>
  <!-- East (white) -->
  <polygon points="148,100 100,94 100,106" fill="rgba(255,255,255,0.6)"/>
  <!-- West (white) -->
  <polygon points="52,100 100,94 100,106" fill="rgba(255,255,255,0.4)"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="8" fill="white"/>
  <circle cx="100" cy="100" r="4" fill="#0D9488"/>
  <!-- Tick marks -->
  <line x1="100" y1="56" x2="100" y2="63" stroke="white" stroke-width="2.5" opacity="0.8"/>
  <line x1="100" y1="137" x2="100" y2="144" stroke="white" stroke-width="2.5" opacity="0.8"/>
  <line x1="56" y1="100" x2="63" y2="100" stroke="white" stroke-width="2.5" opacity="0.8"/>
  <line x1="137" y1="100" x2="144" y2="100" stroke="white" stroke-width="2.5" opacity="0.8"/>
  <!-- N label -->
  <text x="100" y="45" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="sans-serif">N</text>
  <!-- Small decorative stars -->
  <circle cx="42" cy="42" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="158" cy="42" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="155" cy="160" r="2.5" fill="rgba(255,255,255,0.4)"/>
</svg>
