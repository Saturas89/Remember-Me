  <line x1="644" y1="164" x2="660" y2="172" stroke="#7C2D12" stroke-width="7" stroke-linecap="round"/>
  <!-- Running legs (one forward, one back) -->
  <line x1="624" y1="184" x2="612" y2="206" stroke="#374151" stroke-width="8" stroke-linecap="round"/>
  <line x1="638" y1="184" x2="652" y2="200" stroke="#374151" stroke-width="8" stroke-linecap="round"/>
  <!-- Flowers in grass -->
  <circle cx="160" cy="182" r="5" fill="#FDE68A"/>
  <circle cx="160" cy="182" r="3" fill="#F59E0B"/>
  <circle cx="320" cy="186" r="5" fill="#F9A8D4"/>
  <circle cx="320" cy="186" r="3" fill="#EC4899"/>
  <circle cx="480" cy="188" r="5" fill="white"/>
  <circle cx="480" cy="188" r="3" fill="#FDE68A"/>
  <circle cx="680" cy="184" r="5" fill="#86EFAC"/>
  <circle cx="680" cy="184" r="3" fill="#4ADE80"/>
