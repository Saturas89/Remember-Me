  <line x1="365" y1="158" x2="342" y2="148" stroke="#FBBF24" stroke-width="8" stroke-linecap="round"/>
  <line x1="391" y1="158" x2="414" y2="148" stroke="#FBBF24" stroke-width="8" stroke-linecap="round"/>
