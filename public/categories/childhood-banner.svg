  <circle cx="500" cy="142" r="12" fill="none" stroke="rgba(147,197,253,0.7)" stroke-width="2"/>
  <circle cx="480" cy="120" r="9" fill="none" stroke="rgba(147,197,253,0.6)" stroke-width="2"/>
  <circle cx="510" cy="105" r="15" fill="none" stroke="rgba(147,197,253,0.5)" stroke-width="2"/>
  <circle cx="468" cy="95" r="7" fill="none" stroke="rgba(147,197,253,0.5)" stroke-width="1.5"/>
  <ellipse cx="494" cy="136" rx="5" ry="4" fill="rgba(255,255,255,0.3)"/>
  <ellipse cx="476" cy="115" rx="4" ry="3" fill="rgba(255,255,255,0.25)"/>
  <ellipse cx="506" cy="100" rx="6" ry="5" fill="rgba(255,255,255,0.25)"/>
