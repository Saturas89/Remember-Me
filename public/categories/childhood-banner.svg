  <circle cx="394" cy="130" r="9" fill="#F59E0B"/>
  <ellipse cx="378" cy="126" rx="17" ry="10" fill="#F59E0B"/>
  <circle cx="364" cy="142" r="2" fill="white"/>
  <circle cx="392" cy="142" r="2" fill="white"/>
  <circle cx="365" cy="143" r="1.2" fill="#1C1917"/>
  <circle cx="393" cy="143" r="1.2" fill="#1C1917"/>
