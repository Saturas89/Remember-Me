  <rect x="620" y="158" width="24" height="28" rx="7" fill="#F97316"/>
  <circle cx="632" cy="147" r="16" fill="#7C2D12"/>
  <ellipse cx="632" cy="135" rx="16" ry="8" fill="#1C1917"/>
