  <line x1="715" y1="14" x2="708" y2="21" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="723" y1="48" x2="714" y2="48" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="715" y1="82" x2="708" y2="75" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="645" y1="14" x2="652" y2="21" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="637" y1="48" x2="646" y2="48" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
