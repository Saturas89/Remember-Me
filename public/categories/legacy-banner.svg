  <circle cx="160" cy="197" r="5" fill="#FDE68A"/>
  <circle cx="160" cy="197" r="3" fill="#F59E0B"/>
  <circle cx="620" cy="199" r="5" fill="white"/>
  <circle cx="620" cy="199" r="3" fill="#FDE68A"/>
  <circle cx="230" cy="202" r="4" fill="#F9A8D4"/>
  <circle cx="230" cy="202" r="2.5" fill="#EC4899"/>
  <circle cx="560" cy="200" r="4" fill="#F9A8D4"/>
  <circle cx="560" cy="200" r="2.5" fill="#EC4899"/>
  <circle cx="720" cy="196" r="4" fill="#FDE68A"/>
