<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Background stars -->
  <circle cx="28" cy="35" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="55" cy="22" r="1" fill="white" opacity="0.5"/>
  <circle cx="170" cy="30" r="2" fill="white" opacity="0.7"/>
  <circle cx="155" cy="55" r="1" fill="white" opacity="0.4"/>
  <circle cx="35" cy="75" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="178" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="22" cy="140" r="1" fill="white" opacity="0.4"/>
  <circle cx="175" cy="150" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="48" cy="165" r="1" fill="white" opacity="0.3"/>
  <circle cx="160" cy="170" r="2" fill="white" opacity="0.4"/>
  <!-- Glow behind star -->
  <circle cx="100" cy="98" r="52" fill="url(#glow)"/>
  <!-- Large central star -->
  <polygon points="100,42 113,82 155,82 121,106 134,146 100,122 66,146 79,106 45,82 87,82"
