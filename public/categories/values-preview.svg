  <!-- Sparkle dots around star -->
  <circle cx="100" cy="34" r="3" fill="#FDE68A" opacity="0.8"/>
  <circle cx="158" cy="74" r="2" fill="#FDE68A" opacity="0.7"/>
  <circle cx="140" cy="150" r="2.5" fill="#FDE68A" opacity="0.6"/>
  <circle cx="60" cy="150" r="2" fill="#FDE68A" opacity="0.6"/>
  <circle cx="42" cy="74" r="2" fill="#FDE68A" opacity="0.7"/>
</svg>
