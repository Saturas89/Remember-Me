<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2B6E74"/>
      <stop offset="100%" stop-color="#409E97"/>
    </linearGradient>
    <radialGradient id="topglow" cx="60%" cy="5%" r="50%">
      <stop offset="0%" stop-color="#60C8C0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#60C8C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="qglow" cx="61%" cy="52%" r="36%">
      <stop offset="0%" stop-color="#FFE880" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFE880" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" fill="url(#bg)"/>
  <rect width="800" height="240" fill="url(#topglow)"/>
  <!-- Yellow glow centred on question mark -->
  <ellipse cx="490" cy="125" rx="170" ry="110" fill="url(#qglow)"/>

  <!-- Light rays emanating upward -->
  <path d="M 490 15 Q 462 70 446 130 Q 434 168 424 210" stroke="rgba(255,245,140,0.22)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 490 15 Q 518 70 534 130 Q 546 168 556 210" stroke="rgba(255,245,140,0.18)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 490 15 Q 490 75 490 145 Q 490 178 490 212" stroke="rgba(255,245,140,0.24)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 490 15 Q 444 58 418 104 Q 397 135 384 164" stroke="rgba(255,245,140,0.14)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 490 15 Q 536 58 562 104 Q 583 135 596 164" stroke="rgba(255,245,140,0.14)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Question mark glow -->
  <text x="490" y="128" font-family="Georgia, Times New Roman, serif" font-size="88" font-weight="bold" text-anchor="middle" fill="#FFE880" opacity="0.45" filter="url(#blur4)">?</text>
  <!-- Question mark main -->
  <text x="490" y="128" font-family="Georgia, Times New Roman, serif" font-size="82" font-weight="bold" text-anchor="middle" fill="#FFF7D0" opacity="0.96">?</text>

  <!-- Book shadow -->
  <ellipse cx="490" cy="214" rx="90" ry="7" fill="rgba(0,40,45,0.38)"/>
  <!-- Book left cover -->
  <path d="M 408 148 L 413 210 Q 465 215 486 210 L 486 148 Z" fill="#C8903A" stroke="#A07020" stroke-width="1"/>
  <!-- Book right cover -->
  <path d="M 572 148 L 567 210 Q 515 215 494 210 L 494 148 Z" fill="#B07828" stroke="#8A6010" stroke-width="1"/>
  <!-- Spine -->
  <rect x="483" y="145" width="14" height="68" rx="3" fill="#7A5010"/>

  <!-- Left pages -->
  <path d="M 411 150 Q 445 142 486 149 L 486 210 Q 446 215 411 207 Z" fill="#F8F3E5"/>
  <line x1="422" y1="161" x2="480" y2="160" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>
  <line x1="422" y1="170" x2="480" y2="169" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>
  <line x1="422" y1="179" x2="480" y2="178" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>
  <line x1="422" y1="188" x2="480" y2="187" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>
  <line x1="422" y1="197" x2="480" y2="196" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>

  <!-- Right pages -->
  <path d="M 494 149 Q 536 142 569 150 L 567 207 Q 534 215 494 210 Z" fill="#EEE8D5"/>
  <line x1="502" y1="161" x2="561" y2="160" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>
  <line x1="502" y1="170" x2="561" y2="169" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>
  <line x1="502" y1="179" x2="561" y2="178" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>
  <line x1="502" y1="188" x2="561" y2="187" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>
  <line x1="502" y1="197" x2="561" y2="196" stroke="#C8B070" stroke-width="0.9" opacity="0.5"/>

  <!-- Floating small question marks -->
  <text x="433" y="88" font-family="Georgia, serif" font-size="22" fill="#FFE070" opacity="0.46">?</text>
  <text x="555" y="118" font-family="Georgia, serif" font-size="17" fill="#FFE070" opacity="0.38">?</text>
  <text x="436" y="118" font-family="Georgia, serif" font-size="15" fill="#FFE070" opacity="0.32">?</text>
  <text x="620" y="85" font-family="Georgia, serif" font-size="14" fill="#FFE070" opacity="0.28">?</text>
  <text x="600" y="62" font-family="Georgia, serif" font-size="12" fill="#FFE070" opacity="0.24">?</text>

  <!-- 4-pointed stars -->
  <path d="M 455 68 L 457.5 62 L 460 68 L 466 70.5 L 460 73 L 457.5 79 L 455 73 L 449 70.5 Z" fill="#FFF8D0" opacity="0.78"/>
  <path d="M 575 52 L 577.5 46 L 580 52 L 586 54.5 L 580 57 L 577.5 63 L 575 57 L 569 54.5 Z" fill="#FFF8D0" opacity="0.68"/>
  <path d="M 636 75 L 638.5 69 L 641 75 L 647 77.5 L 641 80 L 638.5 86 L 636 80 L 630 77.5 Z" fill="#FFF8D0" opacity="0.62"/>
  <!-- Dot stars -->
  <circle cx="512" cy="55" r="2.5" fill="#FFF8D0" opacity="0.72"/>
  <circle cx="548" cy="44" r="2" fill="#FFF8D0" opacity="0.66"/>
  <circle cx="624" cy="56" r="2.5" fill="#FFF8D0" opacity="0.60"/>
  <circle cx="478" cy="46" r="2" fill="#FFF8D0" opacity="0.66"/>
  <circle cx="666" cy="90" r="2" fill="#FFF8D0" opacity="0.52"/>
  <circle cx="432" cy="53" r="1.8" fill="#FFF8D0" opacity="0.60"/>
  <circle cx="700" cy="68" r="2.2" fill="#FFF8D0" opacity="0.46"/>

  <!-- EIGENE ERINNERUNG -->
  <text x="55" y="105" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34" font-weight="900" fill="white" letter-spacing="3">EIGENE</text>
  <text x="55" y="148" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="34" font-weight="900" fill="white" letter-spacing="0.5">ERINNERUNG</text>
</svg>
