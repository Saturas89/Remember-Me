<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2B6E74"/>
      <stop offset="100%" stop-color="#409E97"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="42%">
      <stop offset="0%" stop-color="#FFE880" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFE880" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur3" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background circle (matches other category previews) -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Yellow glow around question mark -->
  <ellipse cx="100" cy="75" rx="55" ry="48" fill="url(#glow)"/>

  <!-- Light rays -->
  <path d="M 100 20 Q 86 52 80 88 Q 76 108 74 132" stroke="rgba(255,245,140,0.22)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 100 20 Q 114 52 120 88 Q 124 108 126 132" stroke="rgba(255,245,140,0.18)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 20 Q 100 55 100 95 Q 100 115 100 140" stroke="rgba(255,245,140,0.24)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Question mark glow -->
  <text x="100" y="96" font-family="Georgia, Times New Roman, serif" font-size="60" font-weight="bold" text-anchor="middle" fill="#FFE880" opacity="0.45" filter="url(#blur3)">?</text>
  <!-- Question mark main -->
  <text x="100" y="96" font-family="Georgia, Times New Roman, serif" font-size="56" font-weight="bold" text-anchor="middle" fill="#FFF7D0" opacity="0.97">?</text>

  <!-- Book shadow -->
  <ellipse cx="100" cy="162" rx="40" ry="4" fill="rgba(0,40,45,0.35)"/>
  <!-- Book left cover -->
  <path d="M 62 118 L 64 158 Q 88 161 98 158 L 98 118 Z" fill="#C8903A" stroke="#A07020" stroke-width="0.8"/>
  <!-- Book right cover -->
  <path d="M 138 118 L 136 158 Q 112 161 102 158 L 102 118 Z" fill="#B07828" stroke="#8A6010" stroke-width="0.8"/>
  <!-- Spine -->
  <rect x="96" y="116" width="8" height="44" rx="2" fill="#7A5010"/>

  <!-- Left pages -->
  <path d="M 64 120 Q 80 115 98 119 L 98 158 Q 80 162 64 156 Z" fill="#F8F3E5"/>
  <line x1="70" y1="127" x2="92" y2="126" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>
  <line x1="70" y1="133" x2="92" y2="132" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>
  <line x1="70" y1="139" x2="92" y2="138" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>
  <line x1="70" y1="145" x2="92" y2="144" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>
  <line x1="70" y1="151" x2="92" y2="150" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>

  <!-- Right pages -->
  <path d="M 102 119 Q 120 115 136 120 L 136 156 Q 120 162 102 158 Z" fill="#EEE8D5"/>
  <line x1="108" y1="127" x2="130" y2="126" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>
  <line x1="108" y1="133" x2="130" y2="132" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>
  <line x1="108" y1="139" x2="130" y2="138" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>
  <line x1="108" y1="145" x2="130" y2="144" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>
  <line x1="108" y1="151" x2="130" y2="150" stroke="#C8B070" stroke-width="0.7" opacity="0.5"/>

  <!-- Small floating question marks -->
  <text x="68" y="68" font-family="Georgia, serif" font-size="14" fill="#FFE070" opacity="0.45">?</text>
  <text x="126" y="80" font-family="Georgia, serif" font-size="11" fill="#FFE070" opacity="0.38">?</text>
  <text x="69" y="86" font-family="Georgia, serif" font-size="10" fill="#FFE070" opacity="0.32">?</text>

  <!-- Stars -->
  <path d="M 140 52 L 141.5 48 L 143 52 L 147 53.5 L 143 55 L 141.5 59 L 140 55 L 136 53.5 Z" fill="#FFF8D0" opacity="0.75"/>
  <path d="M 58 58 L 59.5 54 L 61 58 L 65 59.5 L 61 61 L 59.5 65 L 58 61 L 54 59.5 Z" fill="#FFF8D0" opacity="0.65"/>
  <circle cx="118" cy="42" r="2" fill="#FFF8D0" opacity="0.70"/>
  <circle cx="80" cy="38" r="1.8" fill="#FFF8D0" opacity="0.65"/>
  <circle cx="152" cy="72" r="1.8" fill="#FFF8D0" opacity="0.55"/>
  <circle cx="46" cy="78" r="1.5" fill="#FFF8D0" opacity="0.55"/>
</svg>
