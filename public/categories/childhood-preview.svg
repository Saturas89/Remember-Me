<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6FF7"/>
      <stop offset="100%" stop-color="#5B8DEF"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Child body -->
  <rect x="84" y="110" width="32" height="36" rx="8" fill="#60A5FA"/>
  <!-- Child head -->
  <circle cx="100" cy="90" r="22" fill="#FBBF24"/>
  <!-- Hair -->
  <ellipse cx="100" cy="72" rx="22" ry="12" fill="#78350F"/>
  <!-- Eyes -->
  <circle cx="92" cy="89" r="3" fill="#1F2937"/>
  <circle cx="108" cy="89" r="3" fill="#1F2937"/>
  <!-- Smile -->
  <path d="M 92 97 Q 100 104 108 97" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="84" y="142" width="13" height="22" rx="5" fill="#1E3A8A"/>
  <rect x="103" y="142" width="13" height="22" rx="5" fill="#1E3A8A"/>
  <!-- Shoes -->
  <ellipse cx="90" cy="166" rx="10" ry="5" fill="#111827"/>
  <ellipse cx="110" cy="166" rx="10" ry="5" fill="#111827"/>
  <!-- Left arm raised with string -->
  <line x1="84" y1="118" x2="60" y2="105" stroke="#FBBF24" stroke-width="8" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="116" y1="118" x2="138" y2="108" stroke="#FBBF24" stroke-width="8" stroke-linecap="round"/>
  <!-- Backpack -->
  <rect x="118" y="108" width="20" height="26" rx="5" fill="#EF4444"/>
  <rect x="121" y="104" width="14" height="8" rx="4" fill="#DC2626"/>
  <!-- Kite string -->
  <path d="M 60 105 Q 45 80 50 50" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="none"/>
  <!-- Kite -->
  <polygon points="50,35 62,50 50,65 38,50" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
  <line x1="38" y1="50" x2="62" y2="50" stroke="#F59E0B" stroke-width="1.5"/>
  <line x1="50" y1="35" x2="50" y2="65" stroke="#F59E0B" stroke-width="1.5"/>
  <!-- Kite tail -->
  <path d="M 50 65 Q 45 72 50 78 Q 55 84 50 90" stroke="#F59E0B" stroke-width="1.5" fill="none"/>
</svg>
