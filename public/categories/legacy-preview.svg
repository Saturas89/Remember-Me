<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Baby footprints (two feet, rotated slightly) -->
  <!-- Left foot sole -->
  <ellipse cx="75" cy="115" rx="20" ry="26" fill="rgba(255,255,255,0.88)" transform="rotate(-12 75 115)"/>
  <!-- Left toes -->
  <circle cx="57" cy="93" r="7" fill="rgba(255,255,255,0.88)"/>
  <circle cx="67" cy="87" r="7.5" fill="rgba(255,255,255,0.88)"/>
  <circle cx="78" cy="85" r="7" fill="rgba(255,255,255,0.88)"/>
  <circle cx="89" cy="87" r="6" fill="rgba(255,255,255,0.88)"/>
  <circle cx="97" cy="93" r="5.5" fill="rgba(255,255,255,0.88)"/>
  <!-- Right foot sole (offset, mirrored) -->
  <ellipse cx="125" cy="125" rx="20" ry="26" fill="rgba(255,255,255,0.75)" transform="rotate(12 125 125)"/>
  <!-- Right toes -->
  <circle cx="143" cy="103" r="7" fill="rgba(255,255,255,0.75)"/>
  <circle cx="133" cy="97" r="7.5" fill="rgba(255,255,255,0.75)"/>
  <circle cx="122" cy="95" r="7" fill="rgba(255,255,255,0.75)"/>
  <circle cx="111" cy="97" r="6" fill="rgba(255,255,255,0.75)"/>
  <circle cx="103" cy="103" r="5.5" fill="rgba(255,255,255,0.75)"/>
  <!-- Small star accents -->
  <circle cx="38" cy="148" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="165" cy="55" r="2.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="155" cy="165" r="2" fill="rgba(255,255,255,0.3)"/>
</svg>
