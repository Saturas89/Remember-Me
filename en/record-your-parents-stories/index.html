    <script type="application/ld+json">

      "@context": "https://schema.org",

    <!-- Apply saved theme before first paint -->
    <script>try{var t=localStorage.getItem('rm-theme')||'sepia';var tc={'nacht':'#1a1a2e','hell':'#f5f5f0','sepia':'#f2ebe0','ozean':'#0a1628'};document.documentElement.setAttribute('data-theme',t);var m=document.querySelector('meta[name="theme-color"]');if(m&&tc[t])m.content=tc[t];var cs=document.querySelector('meta[name="color-scheme"]');if(cs)cs.content=(t==='sepia'||t==='hell')?'only light':'dark'}catch(e){document.documentElement.setAttribute('data-theme','sepia')}</script>
