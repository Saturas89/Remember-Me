<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Home Screen -->
    <meta name="theme-color" content="#f2ebe0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Remember Me" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="description" content="Remember Me – Halte deine Lebensgeschichte für die Nachwelt fest" />
    <title>Remember Me</title>

    <!-- Apply saved theme before first paint to prevent flash -->
    <script>try{var t=localStorage.getItem('rm-theme');document.documentElement.setAttribute('data-theme',t||'sepia')}catch(e){document.documentElement.setAttribute('data-theme','sepia')}</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
