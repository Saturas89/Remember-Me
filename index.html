<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Home Screen -->
    <meta name="theme-color" content="#f2ebe0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Remember Me" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="description" content="Remember Me – Halte deine Lebensgeschichte, Erinnerungen und Werte privat auf deinem Gerät fest. Keine Cloud, kein Server. Für deine Familie und die Nachwelt." />
    <title>Remember Me</title>

    <!-- SEO -->
    <link rel="canonical" href="https://rememberme.dad/" />
    <meta name="keywords" content="Lebensgeschichte festhalten, digitales Gedächtnis, Biografie App, Erinnerungen für Kinder, privates Tagebuch, Vermächtnis digital, Lebensarchiv" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Remember Me" />
    <meta property="og:title" content="Remember Me – Deine Lebensgeschichte für die Nachwelt" />
    <meta property="og:description" content="Halte deine wichtigsten Erinnerungen, Werte und Geschichten privat auf deinem Gerät fest – für deine Familie und die Nachwelt." />
    <meta property="og:url" content="https://rememberme.dad/" />
    <meta property="og:image" content="https://rememberme.dad/friend-invite-promo.jpeg" />
    <meta property="og:image:alt" content="Remember Me – Biografie App für deine persönliche Lebensgeschichte" />
    <meta property="og:locale" content="de_DE" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Remember Me – Deine Lebensgeschichte für die Nachwelt" />
    <meta name="twitter:description" content="Halte deine wichtigsten Erinnerungen privat auf deinem Gerät fest – kein Server, keine Cloud." />
    <meta name="twitter:image" content="https://rememberme.dad/friend-invite-promo.jpeg" />

    <!-- Structured Data: SoftwareApplication (GEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Remember Me",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web, iOS, Android",
      "url": "https://rememberme.dad/",
      "description": "Privacy-first Biografie-App. Halte deine Lebensgeschichte, Werte und Erinnerungen lokal auf deinem Gerät fest – ohne Server, ohne Cloud.",
      "inLanguage": "de-DE",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "featureList": [
        "Offline-first, kein Server",
        "Kategorien: Kindheit, Familie, Beruf, Werte, Erlebnisse, Vermächtnis",
        "Foto- und Sprachaufnahmen",
        "Freunde einladen – Perspektiven sammeln",
        "Export als Archiv, Markdown oder JSON"
      ],
      "screenshot": "https://rememberme.dad/friend-invite-promo.jpeg"
    }
    </script>

    <!-- Apply saved theme before first paint to prevent flash -->
    <script>try{var t=localStorage.getItem('rm-theme')||'sepia';var tc={'nacht':'#1a1a2e','hell':'#f5f5f0','sepia':'#f2ebe0','ozean':'#0a1628'};document.documentElement.setAttribute('data-theme',t);var m=document.querySelector('meta[name="theme-color"]');if(m&&tc[t])m.content=tc[t]}catch(e){document.documentElement.setAttribute('data-theme','sepia')}</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
