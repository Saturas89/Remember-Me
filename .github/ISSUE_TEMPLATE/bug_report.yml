name: Bug Report
description: Report a bug or unexpected behavior in Storyhold
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I tap on X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open the app
        2. Go to ...
        3. Tap on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Web (Desktop)
        - Web (Mobile)
        - iOS (PWA)
        - Android (PWA)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS version
      placeholder: "e.g. Chrome 124 / macOS 14.4"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else relevant.
