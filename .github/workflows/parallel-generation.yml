name: Parallel Spec-Driven Generation

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'docs/requirements/REQ-*.md'
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Filename under docs/requirements/ (e.g. REQ-010-faq.md)"
        required: true

concurrency:
  group: parallel-gen-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      feature_branch: ${{ steps.vars.outputs.branch }}
      spec_file:     ${{ steps.vars.outputs.spec_file }}
      spec_slug:     ${{ steps.vars.outputs.slug }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: vars
        env:
          EVENT_NAME:    ${{ github.event_name }}
          DISPATCH_SPEC: ${{ github.event.inputs.spec_file }}
          REF_NAME:      ${{ github.ref_name }}
          PUSH_BEFORE:   ${{ github.event.before }}
          PUSH_AFTER:    ${{ github.sha }}
        run: |
          set -euxo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SPEC_FILE="$(basename "$DISPATCH_SPEC")"
          else
            ZERO="0000000000000000000000000000000000000000"
            if [ -z "${PUSH_BEFORE:-}" ] || [ "$PUSH_BEFORE" = "$ZERO" ]; then
              git fetch --no-tags --prune --depth=1 origin main || true
              if git rev-parse --verify --quiet origin/main >/dev/null; then
                RANGE="origin/main..$PUSH_AFTER"
              else
                RANGE="$PUSH_AFTER"
              fi
            else
              RANGE="$PUSH_BEFORE..$PUSH_AFTER"
            fi
            CHANGED=$(git log --name-only --pretty=format: "$RANGE" 2>/dev/null | sort -u || true)
            echo "Changed files in $RANGE:"
            printf '%s\n' "$CHANGED"
            SPEC_FILE=$(printf '%s\n' "$CHANGED" | grep -E '^docs/requirements/REQ-.*\.md$' | head -n1 || true)
            if [ -z "$SPEC_FILE" ]; then
              echo "Path filter matched but no docs/requirements/REQ-*.md in range $RANGE — aborting." >&2
              exit 1
            fi
            SPEC_FILE="$(basename "$SPEC_FILE")"
          fi
          BRANCH="$REF_NAME"
          if [ ! -f "docs/requirements/$SPEC_FILE" ]; then
            echo "Spec file docs/requirements/$SPEC_FILE not found on branch $BRANCH" >&2
            exit 1
          fi
          SLUG="${SPEC_FILE%.md}"
          echo "spec_file=$SPEC_FILE" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG"           >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"       >> "$GITHUB_OUTPUT"

  generate:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        role: [implementation, tests]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.feature_branch }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build role-specific prompt file
        id: prompt
        env:
          SPEC_FILE: ${{ needs.prepare.outputs.spec_file }}
          SPEC_SLUG: ${{ needs.prepare.outputs.spec_slug }}
          ROLE:      ${{ matrix.role }}
        run: |
          set -euxo pipefail
          PROMPT_FILE="$RUNNER_TEMP/prompt-$ROLE.md"
          {
            if [ "$ROLE" = "implementation" ]; then
              cat .github/prompts/impl-agent.md
            else
              cat .github/prompts/test-agent.md
            fi
            echo
            echo "## Spec: $SPEC_SLUG"
            echo
            cat "docs/requirements/$SPEC_FILE"
          } > "$PROMPT_FILE"
          echo "prompt_file=$PROMPT_FILE" >> "$GITHUB_OUTPUT"
          wc -c "$PROMPT_FILE"

      - name: Run Claude Code agent (${{ matrix.role }})
        uses: anthropics/claude-code-base-action@v0.0.63
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: ${{ steps.prompt.outputs.prompt_file }}
          claude_args: >-
            --allowedTools "Read,Glob,Grep,Edit,Write,Bash(npm test:*),Bash(npx vitest:*),Bash(npx playwright:*)"
            --max-turns 40

      - name: Rebase & push disjoint changes
        run: |
          git config user.name  "claude-agent-${{ matrix.role }}"
          git config user.email "claude-${{ matrix.role }}@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced by ${{ matrix.role }} agent"
            exit 0
          fi
          git commit -m "chore(${{ matrix.role }}): generated for ${{ needs.prepare.outputs.spec_slug }} [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin "${{ needs.prepare.outputs.feature_branch }}" && \
               git push origin HEAD:"${{ needs.prepare.outputs.feature_branch }}"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep $((RANDOM % 10 + 5))
          done
          exit 1

  open_pr:
    needs: [prepare, generate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.feature_branch }}

      - name: Open PR against main (if none exists)
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          SPEC_FILE: ${{ needs.prepare.outputs.spec_file }}
          SPEC_SLUG: ${{ needs.prepare.outputs.spec_slug }}
          HEAD:      ${{ needs.prepare.outputs.feature_branch }}
          PR_BODY: |
            Parallel-generiert aus `docs/requirements/${{ needs.prepare.outputs.spec_file }}`.

            Zwei unabhängige Claude-Code-Sessions haben parallel gegen dieselbe Spec gearbeitet:
            - **Implementation-Agent** hat Produktionscode unter `src/` geschrieben (ohne `*.test.*`).
            - **Test-Agent** hat Tests unter `src/**/*.test.*` und `e2e/` geschrieben, **ohne den Produktionscode zu sehen** — reine Black-Box-Verifikation aus der Spec.

            Die bestehende E2E-Matrix (5 Browser) läuft auf diesem PR. Grün = beide Spec-Interpretationen passen zusammen.
        run: |
          existing=$(gh pr list --head "$HEAD" --base main --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for $HEAD — skipping."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$HEAD" \
            --title "feat($SPEC_SLUG): parallel impl + tests" \
            --body "$PR_BODY"
