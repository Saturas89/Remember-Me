name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm test

  build:
    name: Build app
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build production bundle
        env:
          VITE_SUPABASE_URL: http://supabase.e2e.local
          VITE_SUPABASE_ANON_KEY: e2e-anon-key
          VITE_E2E: 'true'
        run: npm run build:app

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  e2e:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # On PRs: test all five browser projects.
        # On pushes to main: only chromium (cheap smoke on the merged commit).
        project: ${{ github.event_name == 'pull_request' && fromJSON('["chromium","firefox","webkit","mobile-chrome","mobile-safari"]') || fromJSON('["chromium"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Resolve browser engine for project
        id: engine
        run: |
          case "${{ matrix.project }}" in
            mobile-chrome) echo "name=chromium" >> "$GITHUB_OUTPUT" ;;
            mobile-safari) echo "name=webkit"   >> "$GITHUB_OUTPUT" ;;
            *)             echo "name=${{ matrix.project }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ steps.engine.outputs.name }}

      - name: Install Playwright browser (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ steps.engine.outputs.name }}

      - name: Install Playwright browser (fresh)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ steps.engine.outputs.name }}

      - name: Run E2E tests
        env:
          PW_SKIP_BUILD: '1'
        run: npx playwright test --project=${{ matrix.project }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

  notify:
    name: Notify PR (Claude wakeup ping)
    if: github.event_name == 'pull_request' && always()
    needs: [unit, build, e2e]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const unit = '${{ needs.unit.result }}';
            const build = '${{ needs.build.result }}';
            const e2e = '${{ needs.e2e.result }}';
            const allGreen = unit === 'success' && build === 'success' && e2e === 'success';
            const status = allGreen ? '✅' : '❌';
            const marker = '<!-- claude-ci-ping -->';
            const body = `${marker}\n${status} CI run finished — unit: \`${unit}\`, build: \`${build}\`, e2e: \`${e2e}\`\n\n_This comment exists so the Claude sandbox session receives a webhook on CI completion._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            // Delete any existing marker comments so the next post is a fresh
            // `issue_comment.created` event (edits do not wake the Claude session).
            for (const c of comments) {
              if (c.body?.startsWith(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
