name: Parallel Generation Router

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'docs/requirements/REQ-*.md'

concurrency:
  group: parallel-gen-router-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        env:
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER:  ${{ github.sha }}
          REF_NAME:    ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          ZERO="0000000000000000000000000000000000000000"
          if [ -z "${PUSH_BEFORE:-}" ] || [ "$PUSH_BEFORE" = "$ZERO" ]; then
            git fetch --no-tags --prune --depth=1 origin main || true
            if git rev-parse --verify --quiet origin/main >/dev/null; then
              RANGE="origin/main..$PUSH_AFTER"
            else
              RANGE="$PUSH_AFTER"
            fi
          else
            RANGE="$PUSH_BEFORE..$PUSH_AFTER"
          fi
          CHANGED=$(git log --name-only --pretty=format: "$RANGE" 2>/dev/null | sort -u || true)
          echo "Changed files in $RANGE:"
          printf '%s\n' "$CHANGED"
          SPEC_FILE=$(printf '%s\n' "$CHANGED" | grep -E '^docs/requirements/REQ-.*\.md$' | head -n1 || true)
          if [ -z "$SPEC_FILE" ]; then
            echo "Path filter matched but no docs/requirements/REQ-*.md in range $RANGE — aborting." >&2
            exit 1
          fi
          SPEC_BASENAME="$(basename "$SPEC_FILE")"
          echo "spec_file=$SPEC_BASENAME" >> "$GITHUB_OUTPUT"
          echo "branch=$REF_NAME"         >> "$GITHUB_OUTPUT"

      - name: Dispatch parallel-generation workflow
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          SPEC_FILE: ${{ steps.detect.outputs.spec_file }}
          BRANCH:    ${{ steps.detect.outputs.branch }}
        run: |
          set -euxo pipefail
          gh workflow run parallel-generation.yml \
            --ref "$BRANCH" \
            -f spec_file="$SPEC_FILE"
          echo "Dispatched parallel-generation.yml for $SPEC_FILE on $BRANCH"
