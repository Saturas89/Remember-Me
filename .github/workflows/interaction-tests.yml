name: Interaction Tests (nightly / manual)

# Runs the deep two-device interaction suite (e2e/interaction/) against all
# six browser/device projects defined in playwright.interaction.config.ts.
#
# Deliberately NOT triggered on pull_request or push to main — those paths
# use the main e2e.yml workflow which excludes e2e/interaction/ via testIgnore.
# To run against a specific branch, use workflow_dispatch and select it.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to test (default: main)'
        required: false
        default: ''
  schedule:
    # 03:00 UTC every night
    - cron: '0 3 * * *'

concurrency:
  group: interaction-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (fast gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm test

  build:
    name: Build app
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build production bundle
        env:
          VITE_SUPABASE_URL: http://supabase.e2e.local
          VITE_SUPABASE_ANON_KEY: e2e-anon-key
          VITE_E2E: 'true'
        run: npm run build:app

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-interaction
          path: dist/
          retention-days: 1

  interaction:
    name: ${{ matrix.entry.name }}
    runs-on: ubuntu-latest
    needs: [unit, build]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        entry:
          - { name: chromium,            project: chromium,            engine: chromium }
          - { name: firefox,             project: firefox,             engine: firefox  }
          - { name: android-pixel7,      project: android-pixel7,      engine: chromium }
          - { name: android-samsung-s23, project: android-samsung-s23, engine: chromium }
          - { name: ios-iphone14,        project: ios-iphone14,        engine: webkit   }
          - { name: ios-iphone14promax,  project: ios-iphone14promax,  engine: webkit   }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-interaction
          path: dist/

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ matrix.entry.engine }}

      - name: Install Playwright browser (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.entry.engine }}

      - name: Install Playwright browser (fresh)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.entry.engine }}

      - name: Run interaction tests
        env:
          PW_SKIP_BUILD: '1'
        run: >
          npx playwright test
          --config=playwright.interaction.config.ts
          --project=${{ matrix.entry.project }}

      - name: Summarize flaky tests
        if: ${{ !cancelled() }}
        run: node scripts/summarize-flaky-tests.mjs "${{ matrix.entry.name }}"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: interaction-report-${{ matrix.entry.name }}
          path: playwright-report/
          retention-days: 14

  # ── Real-DB job: local Supabase container, alle 6 Browser/Geräte ────────────
  # Starts a genuine Supabase stack via Docker (PostgREST + GoTrue + Storage)
  # so that RLS policies, FK cascades, private-sync flows, and the complete
  # auth/crypto stack are exercised against a real database across all six
  # browser/device profiles.
  #
  # Runs sequentially on a single runner (workers: 1 in playwright.supabase.config.ts)
  # to avoid test-data interference across the shared local Supabase instance.
  # Nightly runtime budget is ≈ 90 min.
  #
  # Test suites covered:
  #   • src/integration/supabaseRLS.test.ts  – 8 Vitest RLS unit tests
  #   • e2e/supabase/two-device-real.spec.ts – full Alice→Bob share flow
  #   • e2e/supabase/android-ux-real.spec.ts – mobile UX (skip on desktop)
  #   • e2e/supabase/private-sync-real.spec.ts – Storyhold Server sync wizard
  #
  # OneDrive and Google Drive providers are intentionally NOT tested here:
  # they require OAuth2 authorization code flows against cloud services
  # (Microsoft / Google) for which no local Docker equivalent exists.
  # Those providers are covered by mock-based tests in e2e/private-sync/ and
  # by encryption unit tests in src/utils/*.encryption.test.ts.
  interaction-real-db:
    name: Real-DB – alle 6 Browser (Supabase)
    runs-on: ubuntu-latest
    needs: [unit]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Extract Supabase credentials
        id: sb
        run: |
          sb_env=$(supabase status --output env)
          extract() { echo "$sb_env" | grep "^$1=" | sed 's/^[^=]*="\(.*\)"/\1/'; }
          echo "url=$(extract API_URL)"               >> "$GITHUB_OUTPUT"
          echo "anon=$(extract ANON_KEY)"             >> "$GITHUB_OUTPUT"
          echo "service=$(extract SERVICE_ROLE_KEY)"  >> "$GITHUB_OUTPUT"

      - name: Run Vitest RLS tests
        env:
          SUPABASE_URL: ${{ steps.sb.outputs.url }}
          SUPABASE_ANON_KEY: ${{ steps.sb.outputs.anon }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.sb.outputs.service }}
        run: npx vitest run src/integration/supabaseRLS.test.ts

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-all-engines

      - name: Install Playwright browsers (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Install Playwright browsers (fresh)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build app with real Supabase URL
        env:
          VITE_SUPABASE_URL: ${{ steps.sb.outputs.url }}
          VITE_SUPABASE_ANON_KEY: ${{ steps.sb.outputs.anon }}
          VITE_E2E: 'true'
        run: npm run build:app

      - name: Run real-DB E2E tests (alle 6 Projekte, sequenziell)
        env:
          PW_SKIP_BUILD: '1'
          SUPABASE_URL: ${{ steps.sb.outputs.url }}
          SUPABASE_ANON_KEY: ${{ steps.sb.outputs.anon }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.sb.outputs.service }}
        run: npx playwright test --config=playwright.supabase.config.ts

      - name: Stop Supabase
        if: always()
        run: supabase stop

      - name: Summarize flaky tests
        if: ${{ !cancelled() }}
        run: node scripts/summarize-flaky-tests.mjs "supabase-real-db"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: interaction-report-supabase-real-db
          path: playwright-report/
          retention-days: 14

  create-issue:
    name: Open GitHub Issue on failure / flakiness
    needs: [interaction, interaction-real-db]
    # Run after every non-cancelled run so flaky-but-passing tests are also tracked.
    if: always() && needs.interaction.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Each per-project artifact lands in its own subdirectory:
      #   interaction-reports/interaction-report-<name>/interaction-report.json
      # This pattern also picks up interaction-report-supabase-real-db.
      - name: Download all Playwright reports
        uses: actions/download-artifact@v4
        with:
          pattern: interaction-report-*
          path: interaction-reports/

      - name: Create GitHub Issue if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INTERACTION_RESULT: ${{ needs.interaction.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/create-interaction-issue.mjs
