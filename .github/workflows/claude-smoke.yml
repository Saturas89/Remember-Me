name: Claude Smoke Test

on:
  push:
    branches: [claude/parallel-code-test-generation-uqXh3]
    paths: ['.github/workflows/claude-smoke.yml']
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Read CLAUDE.md and summarize its key rules in one sentence. Do not modify any files."
          claude_args: --max-turns 3
