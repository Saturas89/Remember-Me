name: Nightly Production Tests

# Single nightly pipeline: all tests run against https://storyhold.app.
# Replaces the old interaction-tests.yml (deleted).
#
# Two parallel tracks:
#   production-e2e      – smoke tests, 6 browsers in parallel (no Supabase needed)
#   production-nightly  – full real-DB suite (Supabase + Drive), sequential
#
# Traffic isolation: traffic_type=e2e is injected via localStorage so PostHog
# can separate nightly sessions from real users without a separate instance.
# PostHog → Settings → Internal and test users → Cohort "Internal / Test users"
# (ID 129449) matches all persons where traffic_type ≠ real-user (e2e + internal).
# Project filter: id in cohort 129449 → excluded from all insights by default.
#
# Secret management (GitHub Repository → Settings → Secrets → Actions):
#
#   Production backend (required for production-nightly job):
#     SUPABASE_URL              – selber Wert wie VITE_SUPABASE_URL in Vercel (nicht geheim)
#     SUPABASE_ANON_KEY         – selber Wert wie VITE_SUPABASE_ANON_KEY in Vercel (nicht geheim)
#     SUPABASE_SERVICE_ROLE_KEY – service-role JWT für Admin-Cleanup, umgeht RLS (wirklich geheim!)
#
#   OAuth test accounts (required when OAuth flow tests are added):
#     GOOGLE_TEST_EMAIL         – storyhold.e2e.google@gmail.com
#     GOOGLE_TEST_PASSWORD      – Google test account password
#
#   Microsoft OneDrive (noch nicht integriert – Secrets erst anlegen wenn OneDrive-OAuth fertig ist):
#     MICROSOFT_TEST_EMAIL      – storyhold.e2e.microsoft@outlook.com
#     MICROSOFT_TEST_PASSWORD   – Microsoft test account password
#
#   PostHog correlation (optional, enables replay links in failure issues):
#     POSTHOG_PROJECT_ID        – PostHog Project ID (numeric, aus der PostHog-URL)
#
# IMPORTANT: Never store credentials as VITE_* Vercel env vars — those values
# are baked into the public JS bundle and visible to anyone.
#
# Cleanup: test data is created as anonymous Supabase users and deleted in
# afterEach via cleanupUsers(). Orphaned data (from crashed runs) should be
# cleaned up by a scheduled job (to be added) that removes e2e-prefixed rows
# older than 7 days.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to test (default: main)'
        required: false
        default: ''
  schedule:
    # 02:00 UTC every night
    - cron: '0 2 * * *'

concurrency:
  group: nightly-production-${{ github.ref }}
  cancel-in-progress: true

# ── Track 1: Smoke tests (6 browsers in parallel) ────────────────────────────
jobs:
  production-e2e:
    name: Production Smoke – ${{ matrix.entry.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        entry:
          - { name: chromium,            project: chromium,            engine: chromium }
          - { name: firefox,             project: firefox,             engine: firefox  }
          - { name: android-pixel7,      project: android-pixel7,      engine: chromium }
          - { name: android-samsung-s23, project: android-samsung-s23, engine: chromium }
          - { name: ios-iphone14,        project: ios-iphone14,        engine: webkit   }
          - { name: ios-iphone14promax,  project: ios-iphone14promax,  engine: webkit   }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ matrix.entry.engine }}

      - name: Install Playwright browser (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.entry.engine }}

      - name: Install Playwright browser (fresh)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.entry.engine }}

      - name: Run production smoke tests
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          BROWSER_PROFILE: ${{ matrix.entry.project }}
          GOOGLE_TEST_EMAIL: ${{ secrets.GOOGLE_TEST_EMAIL }}
          GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
          # MICROSOFT_TEST_EMAIL / MICROSOFT_TEST_PASSWORD: OneDrive noch nicht integriert
        run: >
          npx playwright test
          --config=playwright.production.config.ts
          --project=${{ matrix.entry.project }}

      - name: Summarize flaky tests
        if: ${{ !cancelled() }}
        run: node scripts/summarize-flaky-tests.mjs "${{ matrix.entry.name }}"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: production-report-${{ matrix.entry.name }}
          path: playwright-report/
          retention-days: 14

# ── Track 2: Nightly Real-DB suite (6 Browser, parallel) ─────────────────────
#
# Runs the full e2e/nightly/ suite against the live production Supabase.
# Each browser runs in its own job (matrix), so all 6 run in parallel.
# Within each job: workers: 1 to prevent test-data interference on the shared DB.
# Runtime budget: ≈ 20 min (down from ≈ 90 min sequential).
#
# Test suites:
#   • e2e/nightly/two-device-real.spec.ts              – Alice→Bob share, RLS, Annotations
#   • e2e/nightly/android-ux-real.spec.ts              – Mobile UX, tap targets, feed scroll
#   • e2e/nightly/multi-recipient-real.spec.ts         – Drei Geräte, mehrere Empfänger
#   • e2e/nightly/private-sync-real.spec.ts            – Storyhold Server sync wizard
#   • e2e/nightly/storage-real.spec.ts                 – CORS + browser context storage RLS
#   • e2e/nightly/chaos-real.spec.ts                   – Abbruch-Pfade, falsche Credentials
#   • e2e/nightly/gdrive-device-switch.spec.ts         – Google Drive Gerätewechsel
#   • e2e/nightly/invitation-existing-profile.spec.ts  – Einladungslink Datenschutz
  production-nightly:
    name: Production Nightly – ${{ matrix.entry.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        entry:
          - { name: chromium,            project: chromium,            engine: chromium }
          - { name: firefox,             project: firefox,             engine: firefox  }
          - { name: android-pixel7,      project: android-pixel7,      engine: chromium }
          - { name: android-samsung-s23, project: android-samsung-s23, engine: chromium }
          - { name: ios-iphone14,        project: ios-iphone14,        engine: webkit   }
          - { name: ios-iphone14promax,  project: ios-iphone14promax,  engine: webkit   }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ matrix.entry.engine }}

      - name: Install Playwright browser (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.entry.engine }}

      - name: Install Playwright browser (fresh)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.entry.engine }}

      - name: Run production nightly E2E tests
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          BROWSER_PROFILE: ${{ matrix.entry.project }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: >
          npx playwright test
          --config=playwright.production-nightly.config.ts
          --project=${{ matrix.entry.project }}

      - name: Summarize flaky tests
        if: ${{ !cancelled() }}
        run: node scripts/summarize-flaky-tests.mjs "${{ matrix.entry.name }}"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          # Named production-report-nightly-<browser> to match the production-report-* pattern
          # in the create-issue download step.
          name: production-report-nightly-${{ matrix.entry.name }}
          path: playwright-report/
          retention-days: 14

# ── Issue creation ────────────────────────────────────────────────────────────
  create-issue:
    name: Open GitHub Issue on failure / flakiness
    needs: [production-e2e, production-nightly]
    if: always() && needs.production-e2e.result != 'cancelled' && needs.production-nightly.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Downloads all production-report-* artifacts into production-reports/
      # (both production-report-{browser} and production-report-nightly).
      - name: Download all Playwright reports
        uses: actions/download-artifact@v4
        with:
          pattern: production-report-*
          path: production-reports/

      - name: Create GitHub Issue if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCTION_RESULT: ${{ needs.production-e2e.result }}
          PRODUCTION_NIGHTLY_RESULT: ${{ needs.production-nightly.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
        run: node scripts/create-production-issue.mjs
